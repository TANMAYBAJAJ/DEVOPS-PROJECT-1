name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1: BUILD + TRIVY SCAN + PUSH  (runs for each service)
  # ═══════════════════════════════════════════════════════════
  build-scan-push:
    name: Build, Scan & Push — ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false        # if one service fails, others still run
      matrix:
        service:
          - name: api-gateway
            context: ./api-gateway
            image: api-gateway

          - name: user-svc
            context: ./user-service
            image: user-svc

          - name: task-svc
            context: ./task-service
            image: task-svc

          - name: notification-svc
            context: ./notification-service
            image: notification-svc

          - name: frontend
            context: ./frontend
            image: frontend

    steps:
      # ── 1. Get the code ──────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Login to Docker Hub ───────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 3. Build the Docker image ────────────────────────────
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }} \
            -t ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:latest \
            ${{ matrix.service.context }}

      # ── 4. TRIVY SECURITY SCAN ───────────────────────────────
      #    Fails pipeline if CRITICAL vulnerabilities are found
      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

      # ── 5. Save scan report as artifact ─────────────────────
      - name: Save Trivy Report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report-${{ matrix.service.name }}
          path: trivy-${{ matrix.service.name }}.sarif

      # ── 6. Push image ONLY if scan passed ────────────────────
      - name: Push to Docker Hub
        run: |
          docker push ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
          docker push ${{ env.DOCKER_USERNAME }}/${{ matrix.service.image }}:latest

  # ═══════════════════════════════════════════════════════════
  # JOB 2: SUMMARY  (runs after all services done)
  # ═══════════════════════════════════════════════════════════
  pipeline-summary:
    name: Pipeline Complete
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: always()

    steps:
      - name: Summary
        run: |
          echo "================================================"
          echo "  DevSecOps Pipeline Complete"
          echo "  All images built, scanned, and pushed"
          echo "  Images are ready for Kubernetes deployment"
          echo "================================================"
