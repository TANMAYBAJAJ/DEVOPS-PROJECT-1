# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration — Containerized (Docker Compose)
# DevOps Task Manager — frontend service
#
# This file is placed at /etc/nginx/conf.d/default.conf inside the container.
#
# What this does:
#   1. Listens on port 80 (published as host port 80 in docker-compose.yml)
#   2. Serves the React SPA static files from /usr/share/nginx/html
#   3. Proxies all /api/* requests to the api-gateway Docker service (port 3000)
#   4. SPA fallback: unknown routes return index.html (React Router support)
#
# Networking:
#   - Uses Docker service name "api-gateway" — Docker's internal DNS resolves
#     this to the correct container IP automatically, no hardcoded addresses.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── React Static Files ────────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # ── API Proxy → api-gateway container ────────────────────────────────────
    # All /api/* requests are forwarded to the api-gateway Docker service.
    # "api-gateway" is the Docker Compose service name; Docker DNS resolves it.
    location /api/ {
        proxy_pass         http://api-gateway:3000;
        proxy_http_version 1.1;

        # Pass real client info to the backend
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (future-proofing)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── SPA Fallback (React Router) ───────────────────────────────────────────
    # For any route that doesn't match a real file, serve index.html.
    # This allows React Router to handle /dashboard, /login, etc. client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────────────────────────────────────
    # Cache JS/CSS/images for 1 year (Vite outputs content-hashed filenames).
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml;
    gzip_min_length 256;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/dtm-access.log;
    error_log  /var/log/nginx/dtm-error.log;
}
